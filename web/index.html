<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wind Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg-1: #f1f8fb;
  --bg-2: #e8f3f6;
  --panel: rgba(255, 255, 255, 0.92);
  --line: rgba(28, 79, 102, 0.1);
  --line-strong: rgba(31, 124, 132, 0.18);
  --text: #17384d;
  --muted: #6a8796;
  --accent-1: #2d8f9f;
  --accent-2: #1f7c84;
  --deepseek-dark: #2f6f84;
  --deepseek-dark-2: #235f73;
  --soft-panel: rgba(255, 255, 255, 0.72);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
  color: var(--text);
  background:
    radial-gradient(900px 460px at 50% -10%, rgba(45, 143, 159, 0.08), transparent 55%),
    linear-gradient(180deg, #f4fafb, #e9f4f6);
}
.layout {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-columns: 272px 1fr;
}
.sidebar {
  border-right: 1px solid rgba(28, 79, 102, 0.08);
  background: rgba(244, 250, 251, 0.92);
  backdrop-filter: blur(12px);
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  min-height: 0;
}
.side-head { padding: 16px 14px 10px; }
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 44px;
  height: 44px;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  flex: 0 0 auto;
  object-fit: contain;
  display: block;
}
.brand-copy {
  min-width: 0;
}
.side-head h2 {
  margin: 0;
  font-size: 22px;
  line-height: 1;
  letter-spacing: 0.2px;
  color: #184055;
}
.side-head p {
  margin: 4px 0 0;
  font-size: 12px;
  color: #7d98a8;
}
.side-actions { padding: 2px 12px 10px; }
.side-actions button {
  width: 100%;
  border: 1px solid rgba(31, 124, 132, 0.14);
  border-radius: 14px;
  padding: 11px 12px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(239, 249, 250, 0.96));
  color: #184055;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(31, 124, 132, 0.08);
}
.side-actions button:hover {
  background: linear-gradient(180deg, #ffffff, #f3fbfc);
  box-shadow: 0 10px 20px rgba(31, 124, 132, 0.12);
}
#session-list {
  overflow-y: auto;
  min-height: 0;
  padding: 2px 10px 14px;
}
.skills-nav {
  border-top: 1px solid rgba(28, 79, 102, 0.08);
  padding: 12px 10px 14px;
  background: rgba(255, 255, 255, 0.44);
}
.skills-nav button {
  width: 100%;
  border: 1px solid rgba(31, 124, 132, 0.14);
  background: rgba(255, 255, 255, 0.96);
  color: #25566c;
  border-radius: 14px;
  padding: 11px 12px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(31, 124, 132, 0.08);
}
.skills-nav button:hover {
  background: rgba(45, 143, 159, 0.08);
}
.trace-panel {
  border-top: 1px solid rgba(28, 79, 102, 0.08);
  padding: 12px 10px 14px;
  background: rgba(255, 255, 255, 0.34);
}
.skills-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.skills-title {
  font-size: 13px;
  font-weight: 800;
  color: #294766;
}
.skills-head button,
.skill-actions button {
  border: 1px solid rgba(45, 108, 223, 0.18);
  background: rgba(255, 255, 255, 0.9);
  color: #21415e;
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.skills-head button:hover,
.skill-actions button:hover {
  background: rgba(45, 108, 223, 0.08);
}
.sidebar #skills-list {
  display: grid;
  gap: 8px;
  max-height: 38vh;
  overflow-y: auto;
  padding-right: 2px;
}
.skill-card {
  border: 1px solid rgba(52, 96, 146, 0.1);
  background: rgba(255, 255, 255, 0.75);
  border-radius: 14px;
  overflow: hidden;
}
.skill-card.disabled {
  opacity: 0.68;
  background: rgba(248, 250, 252, 0.85);
}
.skill-summary {
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding: 10px 11px;
  cursor: pointer;
}
.skill-summary::-webkit-details-marker {
  display: none;
}
.skill-summary-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  flex: 1;
}
.skill-caret {
  width: 22px;
  height: 22px;
  min-width: 22px;
  position: relative;
  border-radius: 999px;
  background: rgba(45, 108, 223, 0.08);
  transition: background 140ms ease, color 140ms ease;
}
.skill-caret::before {
  content: "";
  position: absolute;
  left: 7px;
  top: 6px;
  width: 6px;
  height: 6px;
  border-right: 2px solid #31577c;
  border-bottom: 2px solid #31577c;
  transform: rotate(-45deg);
  transition: transform 140ms ease, border-color 140ms ease;
}
.skill-card[open] .skill-caret {
  background: rgba(45, 108, 223, 0.16);
  color: #1f4060;
}
.skill-card[open] .skill-caret::before {
  transform: rotate(45deg);
  border-color: #1f4060;
}
.skill-card-head {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.skill-summary-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.skill-summary:hover {
  background: rgba(45, 108, 223, 0.05);
}
.skill-name {
  font-size: 13px;
  font-weight: 800;
  color: #1f4060;
}
.skill-dir {
  font-size: 11px;
  color: #7b8ea2;
}
.skill-status {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}
.skill-status.on {
  background: rgba(15, 141, 115, 0.12);
  color: #0f7c67;
}
.skill-status.off {
  background: rgba(160, 87, 30, 0.12);
  color: #8a5b21;
}
.skill-body {
  padding: 0 11px 11px;
  border-top: 1px solid rgba(52, 96, 146, 0.08);
}
.skill-desc,
.skill-when,
.skill-command {
  margin-top: 7px;
  font-size: 12px;
  line-height: 1.55;
  color: #44617e;
}
.skill-meta {
  margin-top: 7px;
  font-size: 12px;
  line-height: 1.55;
  color: #44617e;
}
.skill-tags {
  margin-top: 7px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.skill-tag {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(45, 108, 223, 0.08);
  color: #2f567b;
}
.skill-tag.warn {
  background: rgba(183, 97, 24, 0.12);
  color: #8a5b21;
}
.skill-md {
  margin-top: 8px;
  border-radius: 12px;
  background: rgba(22, 39, 57, 0.06);
  border: 1px solid rgba(52, 96, 146, 0.12);
  padding: 9px 10px;
}
.skill-md-title {
  font-size: 11px;
  font-weight: 800;
  color: #36536f;
  margin-bottom: 6px;
}
.skill-md-body {
  font-size: 12px;
  line-height: 1.55;
  color: #2f4d69;
}
.skill-md-body > * {
  margin: 0 0 0.65em;
}
.skill-md-body > *:last-child {
  margin-bottom: 0;
}
.skill-md-body h1,
.skill-md-body h2,
.skill-md-body h3,
.skill-md-body h4 {
  color: #1f4060;
  line-height: 1.3;
}
.skill-md-body p,
.skill-md-body li,
.skill-md-body td,
.skill-md-body th {
  font-size: 12px;
}
.skill-md-body ul,
.skill-md-body ol {
  margin: 0.2em 0 0.75em 1.2em;
  padding: 0;
}
.skill-md-body code {
  font-size: 11px;
  background: rgba(45, 108, 223, 0.08);
  border-radius: 6px;
  padding: 1px 5px;
  word-break: break-word;
}
.skill-md-body pre {
  margin: 0.35em 0 0.7em;
  padding: 10px 12px;
  border-radius: 10px;
  overflow-x: auto;
  background: rgba(22, 39, 57, 0.08);
  border: 1px solid rgba(52, 96, 146, 0.12);
}
.skill-md-body pre code {
  background: transparent;
  padding: 0;
  border-radius: 0;
}
.skill-md-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.35em 0 0.7em;
}
.skill-md-body th,
.skill-md-body td {
  border: 1px solid rgba(52, 96, 146, 0.12);
  padding: 6px 8px;
  text-align: left;
  vertical-align: top;
}
.skill-md-body thead th {
  background: rgba(45, 108, 223, 0.08);
}
.skill-command code {
  word-break: break-all;
}
.skill-actions {
  margin-top: 8px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.skill-empty {
  font-size: 12px;
  color: #6f86a0;
  padding: 4px 2px;
}
.trace-box {
  display: grid;
  gap: 8px;
  max-height: 28vh;
  overflow-y: auto;
  padding-right: 2px;
}
.trace-empty {
  font-size: 12px;
  color: #6f86a0;
  padding: 4px 2px;
}
.trace-item {
  border: 1px solid rgba(52, 96, 146, 0.1);
  background: rgba(255, 255, 255, 0.72);
  border-radius: 14px;
  padding: 10px 11px;
}
.trace-item-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.trace-event {
  font-size: 12px;
  font-weight: 800;
  color: #1f4060;
}
.trace-time {
  font-size: 11px;
  color: #7b8ea2;
  white-space: nowrap;
}
.trace-data {
  margin: 0;
  font-size: 11.5px;
  line-height: 1.55;
  color: #36536f;
  white-space: pre-wrap;
  word-break: break-word;
}
.trace-data code {
  font-size: 11px;
}
#session-list::-webkit-scrollbar {
  width: 8px;
}
#session-list::-webkit-scrollbar-thumb {
  background: rgba(80, 120, 162, 0.28);
  border-radius: 999px;
}
#session-list::-webkit-scrollbar-track {
  background: transparent;
}
.session-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 28px;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.session-item {
  position: relative;
  border: 1px solid rgba(31, 124, 132, 0.1);
  background: rgba(255, 255, 255, 0.82);
  border-radius: 16px;
  text-align: left;
  cursor: pointer;
  padding: 12px 13px;
  min-width: 0;
  overflow: hidden;
  transition: all 140ms ease;
}
.session-item:hover {
  background: rgba(255, 255, 255, 0.98);
  border-color: rgba(31, 124, 132, 0.2);
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(31, 124, 132, 0.1);
}
.session-item.active {
  background: #ffffff;
  border-color: rgba(31, 124, 132, 0.24);
  box-shadow:
    0 12px 24px rgba(31, 124, 132, 0.1),
    inset 0 0 0 1px rgba(31, 124, 132, 0.08);
}
.session-item.active::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 10px;
  bottom: 10px;
  width: 4px;
  border-radius: 0 999px 999px 0;
  background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
}
.session-title {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #17384d;
}
.session-meta {
  margin-top: 4px;
  font-size: 11px;
  color: #7b97a6;
}
.session-del {
  width: 28px;
  height: 28px;
  min-width: 28px;
  flex: 0 0 28px;
  border-radius: 9px;
  border: 1px solid rgba(183, 47, 47, 0.22);
  background: rgba(255, 255, 255, 0.76);
  color: #a22a2a;
  font-weight: 700;
  cursor: pointer;
  opacity: 0;
  transform: scale(0.94);
  transition: all 140ms ease;
}
.session-row:hover .session-del,
.session-item.active + .session-del {
  opacity: 1;
  transform: scale(1);
}
.session-del:hover {
  background: rgba(255, 232, 232, 0.95);
  border-color: rgba(183, 47, 47, 0.36);
}
.main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 0;
}
.main.skill-mode {
  grid-template-rows: auto 1fr;
}
.top {
  border-bottom: 1px solid rgba(28, 79, 102, 0.08);
  background: rgba(244, 250, 251, 0.82);
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(10px);
}
.top h1 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.1px; }
.top small { color: #7c98a6; }
#top-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.composer-tools {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
}
.thinking-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0;
  padding: 0;
  border: 1px solid rgba(45, 108, 223, 0.18);
  background: rgba(255, 255, 255, 0.9);
  border-radius: 999px;
  box-shadow: 0 4px 14px rgba(33, 83, 136, 0.08);
}
.thinking-btn {
  border: none;
  background: transparent;
  color: #36536f;
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 140ms ease;
  white-space: nowrap;
}
.thinking-btn:hover {
  background: rgba(45, 108, 223, 0.08);
  color: #21415e;
}
.thinking-btn.active {
  background: linear-gradient(145deg, var(--accent-1), var(--accent-2));
  color: #fff;
  box-shadow: 0 6px 16px rgba(36, 94, 162, 0.22);
}
#session-chip {
  font-size: 12px;
  color: #28556a;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(31, 124, 132, 0.14);
  padding: 6px 10px;
  border-radius: 999px;
}
#chat {
  padding: 34px 32px 42px;
  overflow-y: auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#skill-view {
  padding: 20px 24px 30px;
  overflow-y: auto;
  min-height: 0;
}
.skill-view-shell {
  width: min(1080px, 100%);
  margin: 0 auto;
}
.skill-view-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.skill-view-title {
  margin: 0;
  font-size: 24px;
  color: #1f4060;
}
.skill-view-sub {
  margin: 4px 0 0;
  font-size: 13px;
  color: #6f86a0;
}
.skill-view-actions {
  display: inline-flex;
  gap: 10px;
  align-items: center;
}
.skill-view-actions button {
  border: 1px solid rgba(45, 108, 223, 0.18);
  background: rgba(255, 255, 255, 0.92);
  color: #21415e;
  border-radius: 12px;
  padding: 9px 12px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
}
.skill-view-actions button:hover {
  background: rgba(45, 108, 223, 0.08);
}
.skill-view-grid {
  display: grid;
  gap: 10px;
  max-height: none;
  overflow: visible;
  padding-right: 0;
}
.msg {
  width: min(920px, 100%);
  display: flex;
  margin: 6px 0 16px;
}
.msg.user { justify-content: flex-end; }
.msg.ai { justify-content: flex-start; }
.ai-stack {
  width: min(900px, 100%);
}
.bubble {
  width: fit-content;
  max-width: min(820px, 94%);
  border-radius: 18px;
  padding: 12px 15px;
  line-height: 1.75;
  font-size: 15px;
  white-space: normal;
  word-break: break-word;
}
.user .bubble {
  background: linear-gradient(180deg, var(--deepseek-dark), var(--deepseek-dark-2));
  color: #f9fafb;
  box-shadow: 0 8px 20px rgba(31, 41, 55, 0.18);
  white-space: pre-wrap;
  border-bottom-right-radius: 8px;
}
.ai .bubble {
  width: min(860px, 100%);
  max-width: 100%;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 4px 2px;
  border-radius: 0;
  white-space: normal;
}
.ai .bubble > * {
  margin: 0 0 0.9em;
}
.ai .bubble > *:last-child {
  margin-bottom: 0;
}
.ai .bubble ul,
.ai .bubble ol {
  margin: 0.2em 0 0.8em 1.25em;
  padding: 0;
}
.ai .bubble li + li {
  margin-top: 0.18em;
}
.ai .bubble pre {
  margin: 0.4em 0 0.75em;
}
.ai .bubble img {
  display: block;
  width: min(100%, 760px);
  height: auto;
  margin: 0.8em 0;
  border-radius: 14px;
  border: 1px solid rgba(31, 124, 132, 0.12);
  background: rgba(255, 255, 255, 0.92);
  box-shadow: 0 8px 24px rgba(31, 124, 132, 0.08);
}
.think-box {
  width: min(860px, 100%);
  max-width: min(860px, 100%);
  margin-bottom: 8px;
  border: 1px solid rgba(31, 124, 132, 0.12);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.74);
  box-shadow: 0 6px 18px rgba(31, 124, 132, 0.08);
  overflow: hidden;
}
.think-summary {
  cursor: pointer;
  user-select: none;
  padding: 10px 14px;
  font-size: 12px;
  color: #5b7f8e;
  font-weight: 700;
}
.think-content {
  padding: 0 14px 12px;
  font-size: 12px;
  line-height: 1.65;
  color: #426777;
  white-space: pre-wrap;
  word-break: break-word;
}
#composer {
  background: transparent;
  border-top: none;
  padding: 10px 22px 22px;
}
.composer-card,
.welcome-row {
  width: min(840px, 100%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto auto;
  gap: 8px;
  align-items: center;
  border-radius: 28px;
  border: 1px solid rgba(31, 124, 132, 0.12);
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(14px);
  box-shadow:
    0 10px 28px rgba(31, 124, 132, 0.1),
    0 2px 8px rgba(31, 124, 132, 0.05);
  padding: 10px 12px 10px 16px;
}
#composer .composer-card {
  width: min(860px, 100%);
}
.composer-card:focus-within,
.welcome-row:focus-within {
  border-color: var(--line-strong);
  box-shadow:
    0 12px 34px rgba(31, 124, 132, 0.12),
    0 0 0 4px rgba(45, 143, 159, 0.08);
}
#msg, #welcome-msg {
  width: 100%;
  border: none;
  background: transparent;
  padding: 10px 8px;
  font-size: 15px;
  color: var(--text);
  outline: none;
}
#msg::placeholder, #welcome-msg::placeholder {
  color: #86a0ae;
}
#send, #welcome-send {
  border: none;
  border-radius: 999px;
  width: 36px;
  height: 36px;
  min-width: 36px;
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(31, 124, 132, 0.22);
}
#send:hover, #welcome-send:hover {
  transform: translateY(-1px);
}
#send, #welcome-send, #upload-trigger, #welcome-upload-trigger {
  cursor: pointer;
}
#upload-trigger, #welcome-upload-trigger {
  width: 32px;
  height: 32px;
  min-width: 32px;
  padding: 0;
  border-radius: 999px;
  border: 1px solid rgba(31, 124, 132, 0.14);
  background: rgba(241, 249, 250, 0.98);
  color: #287282;
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: none;
}
#upload-trigger:hover, #welcome-upload-trigger:hover {
  background: #e5f4f6;
}
#send:disabled, #welcome-send:disabled, #upload-trigger:disabled, #welcome-upload-trigger:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  box-shadow: none;
}
#welcome {
  height: 100%;
  display: grid;
  place-items: center;
  padding: 24px 24px 40px;
}
.welcome-card {
  width: min(760px, 100%);
  text-align: center;
}
.welcome-brand {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}
.welcome-brand-mark {
  width: 76px;
  height: 76px;
  object-fit: contain;
  display: block;
}
.welcome-title {
  margin: 0 0 12px;
  font-size: clamp(34px, 4vw, 52px);
  font-weight: 800;
  letter-spacing: -0.5px;
}
.welcome-sub {
  margin: 0 0 26px;
  color: #7794a2;
  font-size: 15px;
  line-height: 1.7;
}
.attach-status {
  margin: 8px auto 0;
  width: min(840px, 100%);
  font-size: 12px;
  color: #345d70;
  background: rgba(255, 255, 255, 0.78);
  border: 1px solid rgba(31, 124, 132, 0.1);
  border-radius: 12px;
  padding: 8px 10px;
  line-height: 1.5;
  max-height: 3.8em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.welcome-row {
  padding: 10px 12px 10px 16px;
}
.hidden { display: none !important; }
@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--line);
    grid-template-rows: auto auto;
  }
  #session-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .session-row { min-width: 210px; }
  #chat {
    padding: 14px 12px 22px;
  }
  .msg {
    width: 100%;
    margin: 10px 0;
  }
  .bubble {
    border-radius: 16px;
    font-size: 15px;
    padding: 12px 13px;
    max-width: 95%;
  }
  .think-box {
    max-width: 95%;
    border-radius: 14px;
  }
  #composer {
    padding: 10px 10px 14px;
  }
  .composer-card, .welcome-row {
    width: 100%;
    border-radius: 18px;
    padding: 8px 8px 8px 12px;
  }
  .composer-card, .welcome-row {
    grid-template-columns: minmax(0, 1fr);
    gap: 8px;
  }
  .composer-tools {
    justify-content: space-between;
  }
}
</style>
</head>

<script>
marked.setOptions({
  gfm: true,
  breaks: true,
});

const STORAGE_KEY = "wind_sessions_v2";
const SESSION_KEY = "wind_session_id";
const THINKING_MODE_KEY = "wind_thinking_mode";

const chat = document.getElementById("chat");
const skillView = document.getElementById("skill-view");
const welcome = document.getElementById("welcome");
const composer = document.getElementById("composer");
const mainPanel = document.querySelector(".main");
const input = document.getElementById("msg");
const welcomeInput = document.getElementById("welcome-msg");
const sendBtn = document.getElementById("send");
const welcomeSendBtn = document.getElementById("welcome-send");
const uploadBtn = document.getElementById("upload-trigger");
const welcomeUploadBtn = document.getElementById("welcome-upload-trigger");
const uploadInput = document.getElementById("upload-files-input");
const composerAttachmentStatus = document.getElementById("composer-attachment-status");
const welcomeAttachmentStatus = document.getElementById("welcome-attachment-status");
const newSessionBtn = document.getElementById("new-session");
const sessionList = document.getElementById("session-list");
const sessionChip = document.getElementById("session-chip");
const thinkingModeButtons = Array.from(document.querySelectorAll("[data-role='thinking-cycle']"));
const skillsList = document.getElementById("skills-list");
const reloadSkillsBtn = document.getElementById("reload-skills");
const openSkillsViewBtn = document.getElementById("open-skills-view");
const backToChatBtn = document.getElementById("back-to-chat");
const traceList = document.getElementById("trace-list");
const reloadTraceBtn = document.getElementById("reload-trace");
const traceCount = document.getElementById("trace-count");

let sessions = [];
let currentSessionId = "";
let thinkingMode = "auto";
let skillsCache = [];
let traceCache = [];
let attachedFiles = [];
let currentMainView = "welcome";

function loadThinkingMode() {
  const value = localStorage.getItem(THINKING_MODE_KEY) || "auto";
  return ["auto", "on", "off"].includes(value) ? value : "auto";
}

function saveThinkingMode(value) {
  localStorage.setItem(THINKING_MODE_KEY, value);
}

function setThinkingMode(value) {
  thinkingMode = ["auto", "on", "off"].includes(value) ? value : "auto";
  saveThinkingMode(thinkingMode);
  const labels = {
    auto: "思考: 自动",
    on: "思考: 开启",
    off: "思考: 关闭",
  };
  thinkingModeButtons.forEach((button) => {
    button.classList.add("active");
    button.textContent = labels[thinkingMode];
  });
}

function cycleThinkingMode() {
  const modes = ["auto", "on", "off"];
  const currentIndex = modes.indexOf(thinkingMode);
  const nextMode = modes[(currentIndex + 1) % modes.length];
  setThinkingMode(nextMode);
}

function loadSessions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function saveSessions() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

function formatTime(ts) {
  if (!ts) return "just now";
  return new Date(ts * 1000).toLocaleString();
}

function deriveTitle(text) {
  const t = (text || "").trim();
  return t ? t.slice(0, 40) : "新会话";
}

function setWelcomeMode(enabled) {
  if (enabled) {
    currentMainView = "welcome";
    welcome.classList.remove("hidden");
    chat.classList.add("hidden");
    skillView.classList.add("hidden");
    composer.classList.add("hidden");
    mainPanel.classList.remove("skill-mode");
    sessionChip.textContent = "Session: 未选择";
    return;
  }
  currentMainView = "chat";
  welcome.classList.add("hidden");
  chat.classList.remove("hidden");
  skillView.classList.add("hidden");
  composer.classList.remove("hidden");
  mainPanel.classList.remove("skill-mode");
  sessionChip.textContent = `Session: ${currentSessionId ? currentSessionId.slice(0, 8) : "-"}`;
}

function showSkillView() {
  currentMainView = "skill";
  welcome.classList.add("hidden");
  chat.classList.add("hidden");
  composer.classList.add("hidden");
  skillView.classList.remove("hidden");
  mainPanel.classList.add("skill-mode");
  sessionChip.textContent = "Session: Skill 面板";
}

function returnToChatView() {
  if (currentSessionId) {
    setWelcomeMode(false);
  } else {
    setWelcomeMode(true);
  }
}

function renderAttachmentStatus() {
  const names = attachedFiles.map((item) => item.name || item.file_id);
  const previewLimit = 3;
  let text = "";
  if (names.length) {
    const preview = names.slice(0, previewLimit);
    const remain = names.length - preview.length;
    const summary = remain > 0 ? `${preview.join("，")} 等 ${names.length} 个文件` : preview.join("，");
    text = `已附加 ${names.length} 个文件：${summary}`;
  }
  const fullText = names.length
    ? `已附加 ${names.length} 个文件：${names.join("，")}`
    : "";
  [composerAttachmentStatus, welcomeAttachmentStatus].forEach((el) => {
    if (!el) return;
    if (!text) {
      el.classList.add("hidden");
      el.textContent = "";
      el.removeAttribute("title");
      return;
    }
    el.textContent = text;
    el.title = fullText;
    el.classList.remove("hidden");
  });
}

function upsertSession(meta) {
  const idx = sessions.findIndex((s) => s.id === meta.id);
  const next = {
    id: meta.id,
    title: meta.title || "新会话",
    updatedAt: meta.updatedAt || Date.now() / 1000,
  };
  if (idx >= 0) {
    sessions[idx] = { ...sessions[idx], ...next };
  } else {
    sessions.push(next);
  }
  sessions.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  saveSessions();
  renderSessions();
}

function renderSessions() {
  sessionList.innerHTML = "";
  sessions.forEach((s) => {
    const row = document.createElement("div");
    row.className = "session-row";

    const item = document.createElement("button");
    item.className = `session-item${s.id === currentSessionId ? " active" : ""}`;
    item.onclick = () => switchSession(s.id);

    const title = document.createElement("div");
    title.className = "session-title";
    title.textContent = s.title || "新会话";

    const meta = document.createElement("div");
    meta.className = "session-meta";
    meta.textContent = formatTime(s.updatedAt);

    item.appendChild(title);
    item.appendChild(meta);

    const del = document.createElement("button");
    del.className = "session-del";
    del.textContent = "×";
    del.title = "删除会话";
    del.onclick = async (event) => {
      event.stopPropagation();
      await deleteSession(s.id);
    };

    row.appendChild(item);
    row.appendChild(del);
    sessionList.appendChild(row);
  });
}

function renderSkills(skills = []) {
  skillsCache = skills;
  skillsList.innerHTML = "";
  if (!skills.length) {
    const empty = document.createElement("div");
    empty.className = "skill-empty";
    empty.textContent = "当前没有已加载的 skill。";
    skillsList.appendChild(empty);
    return;
  }

  skills.forEach((skill) => {
    const card = document.createElement("details");
    card.className = "skill-card";
    card.classList.toggle("disabled", skill.enabled === false);
    card.open = false;

    const summary = document.createElement("summary");
    summary.className = "skill-summary";

    const summaryLeft = document.createElement("div");
    summaryLeft.className = "skill-summary-left";

    const head = document.createElement("div");
    head.className = "skill-card-head";

    const left = document.createElement("div");
    const name = document.createElement("div");
    name.className = "skill-name";
    name.textContent = skill.name || "(unnamed)";
    left.appendChild(name);

    const meta = document.createElement("div");
    meta.className = "skill-dir";
    meta.textContent = (skill.pack_dir || "").split("/").slice(-2).join("/");
    left.appendChild(meta);

    const status = document.createElement("div");
    status.className = `skill-status ${skill.enabled === false ? "off" : "on"}`;
    status.textContent = skill.enabled === false ? "已禁用" : "已启用";

    head.appendChild(left);
    summaryLeft.appendChild(head);
    summary.appendChild(summaryLeft);
    const summaryRight = document.createElement("div");
    summaryRight.className = "skill-summary-right";
    const caret = document.createElement("span");
    caret.className = "skill-caret";
    summaryRight.appendChild(status);
    summaryRight.appendChild(caret);
    summary.appendChild(summaryRight);

    const body = document.createElement("div");
    body.className = "skill-body";
    const desc = document.createElement("div");
    desc.className = "skill-desc";
    desc.textContent = skill.description || "无说明";

    const when = document.createElement("div");
    when.className = "skill-when";
    if (skill.when_to_use) {
      when.textContent = `何时使用: ${skill.when_to_use}`;
    }

    const command = document.createElement("div");
    command.className = "skill-command";
    if (skill.has_runtime === false) {
      command.textContent = "命令: 无固定入口，由模型阅读 SKILL.md 后自行推导。";
    } else {
      command.innerHTML = `命令: <code>${(skill.command_template || []).join(" ")}</code>`;
    }

    const metaTags = document.createElement("div");
    metaTags.className = "skill-tags";
    const tags = [];
    const availability = skill.availability || {};
    if (skill.user_invocable === true) tags.push("可手动调用");
    if (skill.user_invocable === false) tags.push("仅模型调用");
    if (skill.disable_model_invocation === true) tags.push("禁模型调用");
    if (skill.primary_env) tags.push(`主环境变量: ${skill.primary_env}`);
    (skill.required_env || []).forEach((item) => tags.push(`ENV: ${item}`));
    (skill.required_bins || []).forEach((item) => tags.push(`BIN: ${item}`));
    (availability.missing_env || []).forEach((item) => tags.push(`缺少环境变量: ${item}`));
    (availability.missing_bins || []).forEach((item) => tags.push(`缺少命令: ${item}`));
    tags.forEach((label) => {
      const tag = document.createElement("span");
      tag.className = "skill-tag";
      if (label.startsWith("缺少")) {
        tag.classList.add("warn");
      }
      tag.textContent = label;
      metaTags.appendChild(tag);
    });

    const skillMd = document.createElement("div");
    skillMd.className = "skill-md";
    skillMd.innerHTML = `<div class="skill-md-title">SKILL.md</div><div class="skill-md-body"></div>`;
    skillMd.querySelector(".skill-md-body").innerHTML = marked.parse(normalizeSkillMarkdown(skill.skill_md_content || ""));

    const actions = document.createElement("div");
    actions.className = "skill-actions";

    const toggleBtn = document.createElement("button");
    toggleBtn.type = "button";
    toggleBtn.textContent = skill.enabled === false ? "启用" : "禁用";
    toggleBtn.onclick = async () => {
      await toggleSkillFromPanel(skill.name, skill.enabled === false);
    };

    actions.appendChild(toggleBtn);
    if (skill.user_invocable !== false) {
      const runBtn = document.createElement("button");
      runBtn.type = "button";
      runBtn.textContent = "运行";
      runBtn.disabled = skill.enabled === false || availability.available === false;
      runBtn.onclick = async () => {
        const skillInput = window.prompt(`运行 skill: ${skill.name}\n请输入参数：`, "");
        if (skillInput === null) return;
        await runSkillFromPanel(skill.name, skillInput);
      };
      actions.appendChild(runBtn);
    }
    body.appendChild(desc);
    if (skill.when_to_use) {
      body.appendChild(when);
    }
    body.appendChild(command);
    if (tags.length) {
      body.appendChild(metaTags);
    }
    body.appendChild(skillMd);
    body.appendChild(actions);
    card.appendChild(summary);
    card.appendChild(body);
    skillsList.appendChild(card);
  });
}

function formatTraceValue(value) {
  if (value === null || value === undefined) return "";
  if (typeof value === "string") return value;
  try {
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value);
  }
}

function renderTrace(trace = []) {
  traceCache = trace;
  traceList.innerHTML = "";
  traceCount.textContent = `${trace.length} 条`;

  if (!currentSessionId) {
    const empty = document.createElement("div");
    empty.className = "trace-empty";
    empty.textContent = "请选择会话后查看调用轨迹。";
    traceList.appendChild(empty);
    return;
  }

  if (!trace.length) {
    const empty = document.createElement("div");
    empty.className = "trace-empty";
    empty.textContent = "这个会话暂时还没有工具调用轨迹。";
    traceList.appendChild(empty);
    return;
  }

  trace.slice().reverse().forEach((entry) => {
    const item = document.createElement("div");
    item.className = "trace-item";

    const head = document.createElement("div");
    head.className = "trace-item-head";

    const event = document.createElement("div");
    event.className = "trace-event";
    event.textContent = entry.event || "(unknown)";

    const time = document.createElement("div");
    time.className = "trace-time";
    time.textContent = entry.time || "";

    head.appendChild(event);
    head.appendChild(time);

    const data = document.createElement("pre");
    data.className = "trace-data";
    data.textContent = formatTraceValue(entry.data || {});

    item.appendChild(head);
    item.appendChild(data);
    traceList.appendChild(item);
  });
}

function normalizeSkillMarkdown(text) {
  const raw = (text || "").replace(/\r\n/g, "\n");
  if (!raw.startsWith("---\n")) {
    return raw;
  }
  const end = raw.indexOf("\n---\n", 4);
  if (end < 0) {
    return raw;
  }
  return raw.slice(end + 5).trim();
}

async function refreshSkills() {
  try {
    reloadSkillsBtn.disabled = true;
    const data = await fetchJson("/skills");
    renderSkills(data.skills || []);
  } catch (err) {
    skillsList.innerHTML = `<div class="skill-empty">读取 skill 失败: ${err}</div>`;
  } finally {
    reloadSkillsBtn.disabled = false;
  }
}

async function reloadSkills() {
  try {
    reloadSkillsBtn.disabled = true;
    const data = await fetchJson("/skills/reload", { method: "POST" });
    renderSkills(data.skills || []);
    addMessage("ai", `Skills 已重载，共 ${data.skills?.length || 0} 个。`);
  } catch (err) {
    addMessage("ai", `Skill reload 失败: ${err}`);
  } finally {
    reloadSkillsBtn.disabled = false;
  }
}

async function refreshTrace() {
  if (!currentSessionId) {
    renderTrace([]);
    return;
  }
  try {
    reloadTraceBtn.disabled = true;
    const data = await fetchJson(`/session/trace?session_id=${encodeURIComponent(currentSessionId)}`);
    renderTrace(data.trace || []);
  } catch (err) {
    traceList.innerHTML = `<div class="trace-empty">读取 trace 失败: ${err}</div>`;
    traceCount.textContent = "0 条";
  } finally {
    reloadTraceBtn.disabled = false;
  }
}

async function refreshAttachments() {
  if (!currentSessionId) {
    attachedFiles = [];
    renderAttachmentStatus();
    return;
  }
  try {
    const data = await fetchJson(`/session/attachments?session_id=${encodeURIComponent(currentSessionId)}`);
    attachedFiles = (data.files || []).map((item) => ({
      file_id: item.file_id,
      name: item.file_id,
      size: item.size,
    }));
    renderAttachmentStatus();
  } catch {
    attachedFiles = [];
    renderAttachmentStatus();
  }
}

async function runSkillFromPanel(skillName, skillInput = "") {
  if (!currentSessionId) {
    await createNewSession(true);
    if (!currentSessionId) return;
  }
  setWelcomeMode(false);
  addMessage("user", `:skill ${skillName}${skillInput ? ` ${skillInput}` : ""}`);
  const aiMessage = addAssistantMessage("", "");
  try {
    const data = await fetchJson("/skills/execute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: currentSessionId,
        skill: skillName,
        input: skillInput,
      }),
    });
    aiMessage.setAnswer(data.result || "(no output)");
    await refreshTrace();
  } catch (err) {
    aiMessage.setAnswer(`Skill 执行失败: ${err}`);
    await refreshTrace();
  }
}

async function toggleSkillFromPanel(skillName, enabled) {
  try {
    const data = await fetchJson("/skills/toggle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        skill: skillName,
        enabled,
      }),
    });
    const nextSkills = skillsCache.map((skill) =>
      skill.name === skillName ? data.skill : skill
    );
    renderSkills(nextSkills);
    addMessage("ai", `Skill ${skillName} 已${enabled ? "启用" : "禁用"}。`);
  } catch (err) {
    addMessage("ai", `切换 skill 失败: ${err}`);
  }
}

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function addUserMessage(text) {
  const wrap = document.createElement("div");
  wrap.className = "msg user";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text || "";
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function addAssistantMessage(initialAnswer = "", initialThinking = "") {
  const wrap = document.createElement("div");
  wrap.className = "msg ai";

  const stack = document.createElement("div");
  stack.className = "ai-stack";

  const thinkBox = document.createElement("details");
  thinkBox.className = "think-box";
  thinkBox.open = false;

  const thinkSummary = document.createElement("summary");
  thinkSummary.className = "think-summary";
  thinkSummary.textContent = "思考过程";

  const thinkContent = document.createElement("div");
  thinkContent.className = "think-content";

  thinkBox.appendChild(thinkSummary);
  thinkBox.appendChild(thinkContent);

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  let answerText = initialAnswer || "";
  let thinkingText = initialThinking || "";

  const render = () => {
    const normalizedAnswer = (answerText || "").replace(/\n{3,}/g, "\n\n");
    bubble.innerHTML = marked.parse(normalizedAnswer);
    thinkContent.textContent = thinkingText;
    thinkBox.classList.toggle("hidden", !thinkingText.trim());
    scrollBottom();
  };

  stack.appendChild(thinkBox);
  stack.appendChild(bubble);
  wrap.appendChild(stack);
  chat.appendChild(wrap);

  render();

  return {
    setAnswer(text) {
      answerText = text || "";
      render();
    },
    appendAnswer(chunk) {
      answerText += chunk || "";
      render();
    },
    setThinking(text) {
      thinkingText = text || "";
      render();
    },
    appendThinking(chunk) {
      thinkingText += chunk || "";
      render();
    },
  };
}

function addMessage(role, text, thinking = "") {
  if (role === "user") {
    return addUserMessage(text);
  }
  const ai = addAssistantMessage(text, thinking);
  return ai;
}

function renderAssistantHistory(content, thinking) {
  addAssistantMessage(content || "", thinking || "");
}

function renderHistory(messages) {
  chat.innerHTML = "";
  if (!messages || !messages.length) {
    renderAssistantHistory("这是一个新会话，开始聊点什么吧。", "");
    return;
  }

  messages.forEach((m) => {
    if (m.role === "user") {
      addUserMessage(m.content || "");
    } else if (m.role === "assistant") {
      renderAssistantHistory(m.content || "", m.thinking || "");
    }
  });
}

async function fetchJson(url, options = {}) {
  const resp = await fetch(url, options);
  if (!resp.ok) {
    throw new Error(`HTTP ${resp.status}`);
  }
  return resp.json();
}

async function syncSessionsFromServer() {
  try {
    const data = await fetchJson("/sessions");
    (data.sessions || []).forEach((s) => {
      upsertSession({
        id: s.session_id,
        title: s.title,
        updatedAt: s.updated_at,
      });
    });
  } catch {
    // ignore server sync failure
  }
}

async function switchSession(sessionId) {
  if (!sessionId) return;
  currentSessionId = sessionId;
  attachedFiles = [];
  renderAttachmentStatus();
  localStorage.setItem(SESSION_KEY, currentSessionId);
  setWelcomeMode(false);
  renderSessions();

  try {
    const data = await fetchJson(`/session/history?session_id=${encodeURIComponent(sessionId)}`);
    renderHistory(data.messages || []);
    await refreshAttachments();
    await refreshTrace();
  } catch (err) {
    renderHistory([]);
    await refreshAttachments();
    renderTrace([]);
    addMessage("ai", `读取会话历史失败: ${err}`);
  }
}

async function createNewSession(switchNow = true) {
  try {
    newSessionBtn.disabled = true;
    const data = await fetchJson("/session/new", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({}),
    });

    const sessionId = data.session_id;
    upsertSession({ id: sessionId, title: data.title || "新会话", updatedAt: data.updated_at });

    if (switchNow) {
      attachedFiles = [];
      renderAttachmentStatus();
      await switchSession(sessionId);
    }
  } catch (err) {
    addMessage("ai", `创建会话失败: ${err}`);
  } finally {
    newSessionBtn.disabled = false;
  }
}

async function deleteSession(sessionId) {
  if (!sessionId) return;
  if (!window.confirm("确定删除这个会话吗？")) return;

  try {
    await fetchJson("/session/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId }),
    });
  } catch (err) {
    addMessage("ai", `删除会话失败: ${err}`);
    return;
  }

  sessions = sessions.filter((s) => s.id !== sessionId);
  saveSessions();

  if (currentSessionId === sessionId) {
    currentSessionId = "";
    attachedFiles = [];
    renderAttachmentStatus();
    localStorage.removeItem(SESSION_KEY);
    setWelcomeMode(true);
    renderHistory([]);
    renderTrace([]);
  }
  renderSessions();
}

async function send() {
  await sendMessage(input.value.trim(), "composer");
}

async function sendFromWelcome() {
  await sendMessage(welcomeInput.value.trim(), "welcome");
}

async function uploadAndAnalyze() {
  if (!currentSessionId) {
    await createNewSession(true);
    if (!currentSessionId) return;
  }
  uploadInput.value = "";
  uploadInput.click();
}

async function handleSelectedUploads() {
  const files = Array.from(uploadInput.files || []);
  if (!files.length) return;

  if (!currentSessionId) {
    await createNewSession(true);
    if (!currentSessionId) return;
  }

  const formData = new FormData();
  formData.append("session_id", currentSessionId);
  files.forEach((file) => formData.append("files", file));

  sendBtn.disabled = true;
  welcomeSendBtn.disabled = true;
  uploadBtn.disabled = true;
  welcomeUploadBtn.disabled = true;
  newSessionBtn.disabled = true;

  try {
    const response = await fetch("/upload", {
      method: "POST",
      body: formData,
    });
    if (!response.ok) {
      const errText = await response.text();
      addMessage("ai", `上传失败: ${response.status} ${errText}`);
      return;
    }
    const payload = await response.json();
    if (!payload.ok) {
      addMessage("ai", `上传失败: ${payload.error || "未知错误"}`);
      return;
    }
    const newFiles = payload.saved_files || [];
    const ids = payload.attachment_ids || [];
    const byId = new Map(attachedFiles.map((item) => [item.file_id, item]));
    newFiles.forEach((item) => byId.set(item.file_id, item));
    attachedFiles = ids.length ? ids.map((id) => byId.get(id) || { file_id: id, name: id }) : Array.from(byId.values());
    renderAttachmentStatus();
    const fileCount = newFiles.length;
    const rejected = (payload.rejected_files || []).length;
    addMessage(
      "ai",
      `上传完成：新增 ${fileCount} 个文本文件${rejected ? `，拒绝 ${rejected} 个非文本文件` : ""}。你现在可以直接提问文件内容。`
    );
  } catch (err) {
    addMessage("ai", `上传失败: ${err}`);
  } finally {
    sendBtn.disabled = false;
    welcomeSendBtn.disabled = false;
    uploadBtn.disabled = false;
    welcomeUploadBtn.disabled = false;
    newSessionBtn.disabled = false;
    uploadInput.value = "";
  }
}

async function sendMessage(msg, source) {
  if (!msg) return;

  if (!currentSessionId) {
    await createNewSession(true);
    if (!currentSessionId) return;
  }

  if (source === "welcome") {
    welcomeInput.value = "";
  } else {
    input.value = "";
  }

  addUserMessage(msg);
  const aiMessage = addAssistantMessage("", "");

  sendBtn.disabled = true;
  welcomeSendBtn.disabled = true;
  uploadBtn.disabled = true;
  welcomeUploadBtn.disabled = true;
  newSessionBtn.disabled = true;

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: msg,
        session_id: currentSessionId,
        thinking_mode: thinkingMode,
        attachment_ids: attachedFiles.map((item) => item.file_id),
      }),
    });

    if (!response.ok || !response.body) {
      aiMessage.setAnswer(`请求失败 (${response.status})`);
      return;
    }

    const contentType = response.headers.get("content-type") || "";
    if (!contentType.includes("text/event-stream")) {
      const plain = await response.text();
      aiMessage.setAnswer(plain);
    } else {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let doneEventSeen = false;

      const handleSseBlock = (block) => {
        const lines = block.split("\n");
        let event = "message";
        const dataParts = [];
        for (const rawLine of lines) {
          const line = rawLine.trimEnd();
          if (line.startsWith("event:")) {
            event = line.slice(6).trim();
          } else if (line.startsWith("data:")) {
            dataParts.push(line.slice(5).trimStart());
          }
        }
        const dataText = dataParts.join("\n");
        let payload = {};
        if (dataText) {
          try {
            payload = JSON.parse(dataText);
          } catch {
            payload = { text: dataText };
          }
        }
        const text = typeof payload.text === "string" ? payload.text : "";
        if (event === "thinking") {
          aiMessage.appendThinking(text);
        } else if (event === "answer") {
          aiMessage.appendAnswer(text);
        } else if (event === "error") {
          aiMessage.setAnswer(text || "网络错误");
        } else if (event === "done") {
          doneEventSeen = true;
        }
      };

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        while (true) {
          const splitAt = buffer.indexOf("\n\n");
          if (splitAt < 0) break;
          const block = buffer.slice(0, splitAt);
          buffer = buffer.slice(splitAt + 2);
          if (block.trim()) handleSseBlock(block);
        }
      }

      buffer += decoder.decode();
      if (buffer.trim()) {
        handleSseBlock(buffer.trim());
      }
      if (!doneEventSeen) {
        scrollBottom();
      }
    }

    const currentMeta = sessions.find((s) => s.id === currentSessionId);
    const title = (currentMeta && currentMeta.title && currentMeta.title !== "新会话")
      ? currentMeta.title
      : deriveTitle(msg);
    upsertSession({ id: currentSessionId, title, updatedAt: Date.now() / 1000 });
    await refreshTrace();
  } catch (err) {
    aiMessage.setAnswer(`网络错误: ${err}`);
    await refreshTrace();
  } finally {
    sendBtn.disabled = false;
    welcomeSendBtn.disabled = false;
    uploadBtn.disabled = false;
    welcomeUploadBtn.disabled = false;
    newSessionBtn.disabled = false;
    input.focus();
  }
}

input.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    send();
  }
});

welcomeInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    sendFromWelcome();
  }
});

thinkingModeButtons.forEach((button) => {
  button.addEventListener("click", cycleThinkingMode);
});

reloadSkillsBtn.addEventListener("click", reloadSkills);
openSkillsViewBtn.addEventListener("click", showSkillView);
backToChatBtn.addEventListener("click", returnToChatView);
reloadTraceBtn.addEventListener("click", refreshTrace);
uploadBtn.addEventListener("click", uploadAndAnalyze);
welcomeUploadBtn.addEventListener("click", uploadAndAnalyze);
uploadInput.addEventListener("change", handleSelectedUploads);

(async () => {
  sessions = loadSessions();
  setThinkingMode(loadThinkingMode());
  renderSessions();
  await refreshSkills();
  await syncSessionsFromServer();
  renderAttachmentStatus();
  renderTrace([]);
  currentSessionId = "";
  localStorage.removeItem(SESSION_KEY);
  setWelcomeMode(true);
  welcomeInput.focus();
})();
</script>
